<!Doctype html>
<html>
    <head>
        <title>
            button
        </title>
<STYLE>
    .subscribe-button {
    background-color:rgb(201, 0, 0);
    color: white;
    border:none;
    height: 35px;
    width: 105px;

    font-size:15px;
    border-radius:2px;
    cursor: pointer;
    margin-right:9px;
    transition:opacity 0.15s;
    }

    .subscribe-button:hover{
        opacity:0.8;
    }
    .subscribe-button:active{
        opacity:0.4;
    }

    .join-button{
        background-color:white;
        color:rgb(41, 118, 211);
        border-color:rgb(41,118,211);
        height:36px;
        width:60;
        cursor:pointer;
        border-style:solid;
        border-width:1px;
        border-radius:2px;
        margin-right:8px;
        transition:background-color 1s,color 1s;
        transition:opacity 0.15s;
    }


    .join-button:hover{
        background-color:rgb(41, 118, 211);
        color:white;
    }
    .join-button:active{
        opacity:0.7;

    }

    .tweet-button{
        background-color:rgb(2, 158, 236);
        color:white;
        height:35px;
        width:75px;
        border-radius:17px;
        border:none;
        text-size-adjust: 19px;
        font-weight:bold;
        font-size:15px;
        cursor:pointer;
        transition:shadow 0.15,opacity 0.20;

    }
    
    .tweet-button:hover{
         box-shadow: 5px 5px 5px rgba(83, 82, 82);
    }
    .tweet-button:active{
        opacity:0.5;
    }
</STYLE>
    </head>
    <body>
        <button class="subscribe-button">
    SUBSCRIBE
</button>
<button class="join-button">
    JOIN
</button>
<button class="tweet-button">
    Tweet
</button>
    </body>
</html>
